<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CPIS360 WebAR Lab</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- Marker -->
    <a-marker preset="hiro">

      <!-- BOX -->
      <a-box 
        position="-1 0.5 0"
        color="red"
        scale="0.5 0.5 0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-box>

      <!-- SPHERE -->
      <a-sphere 
        position="0 0.7 0"
        color="blue"
        radius="0.4"
        animation="property: position; to: 0 1.2 0; dir: alternate; loop: true; dur: 2000">
      </a-sphere>

      <!-- CYLINDER -->
      <a-cylinder 
        position="1 0.5 0"
        color="green"
        height="1"
        radius="0.3"
        animation="property: rotation; to: 360 0 0; loop: true; dur: 3000">
      </a-cylinder>

      <!-- TEXT (PUT YOUR NAME HERE) -->
<a-text 
  value="Faris"
  position="0 1.3 0"
  align="center"
  color="white"
  width="3"
  look-at="[camera]">
</a-text>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
